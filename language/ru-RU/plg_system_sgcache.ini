PLG_SYSTEM_SGCACHE_DEBUG_PANEL_TITLE="SG Cache Debug"

; Advanced settings
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT="Разделение по User Agent"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Добавляет заголовок Vary: User-Agent для выдачи разных кэшированных версий для мобильных и настольных браузеров."
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="Кэш для авторизованных пользователей"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="Разрешить кэширование для авторизованных пользователей. ВНИМАНИЕ: Может показывать некорректный контент пользователям. Включайте только если ваш сайт показывает одинаковый контент всем пользователям."
PLG_SYSTEM_SGCACHE_PURGE_BUTTON="Ручная очистка кэша"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON_DESC="Нажмите для ручной очистки всего кэша SiteGround."

; Purge messages
PLG_SYSTEM_SGCACHE_PURGE_ALL_CACHE="Очистить весь кэш"
PLG_SYSTEM_SGCACHE_PURGE_SUCCESS="Кэш SiteGround успешно очищен."
PLG_SYSTEM_SGCACHE_PURGE_PATH_SUCCESS="Кэш SiteGround очищен для пути: %s"
PLG_SYSTEM_SGCACHE_PURGE_FAILED="Не удалось очистить кэш SiteGround. Убедитесь, что вы находитесь на сервере SiteGround."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND="Хостинг SiteGround не обнаружен. Операции с кэшем недоступны."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND_NOTICE="Этот сайт, по-видимому, не размещён на SiteGround. Плагин SiteGround Cache включён, но все операции с кэшем неактивны. Если вы перенесли этот сайт с SiteGround, вы можете безопасно отключить или удалить этот плагин."
PLG_SYSTEM_SGCACHE_GO_TO_SETTINGS="Настройки плагина"

