PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Интегрирует Joomla с серверной системой кэширования SiteGround. Автоматически очищает динамический кэш при изменении контента и устанавливает соответствующие заголовки кэширования.<br/><br/><small>Протокол взаимодействия с кэшем изучен из плагина <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> для WordPress от SiteGround (GPLv3). Код не копировался; это независимая реализация для Joomla. Не связано с SiteGround и не одобрено SiteGround.</small>"

; Fieldset labels
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Настройки Cache"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="Кнопка панели инструментов"
PLG_SYSTEM_SGCACHE_FIELDSET_LOGGING="Журналирование &amp; Debug"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="Расширенные настройки"

; Cache settings
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Включить динамический кэш"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Включает заголовки динамического кэширования SiteGround. Страницы будут помечены как кэшируемые для обратного прокси-сервера SiteGround."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Автоочистка при изменении контента"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Автоматически очищать связанные записи кэша при сохранении, удалении или изменении состояния контента."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Порог очистки"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="Если количество URL, требующих очистки, превышает это число, будет выполнена полная очистка кэша вместо индивидуальной. По умолчанию: 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="Исключённые URL"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Введите один путь URL на строку (относительно корня сайта), который никогда не должен кэшироваться. Пример: /administrator или /моя-приватная-страница"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Исключённые компоненты"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Выберите компоненты, страницы которых никогда не должны кэшироваться SiteGround."

; Toolbar button settings
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Показать кнопку очистки в админке"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Отображать кнопку 'Purge SG Cache' в верхней панели административной области Joomla, видимую на каждой странице."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Режим кнопки"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Простой: одна кнопка, очищающая весь кэш. Dropdown: разделённая кнопка с 'Очистить всё' и пользовательскими путями."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Простой - Очистить всё"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Dropdown - Очистить всё + Пользовательские пути"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Пользовательские пути очистки"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="Одна запись на строку в формате: Метка|/путь. Они отображаются как опции в dropdown. Пример: Блог|/blog или Новости|/news"

; Toolbar button labels
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Очистить весь кэш"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="Очистить определённый путь"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Очистка..."

; Logging & debug settings
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Включить журналирование в файл"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Записывать операции кэширования в файл журнала в каталоге логов Joomla. Полезно для устранения неполадок. Отключите в продакшене для лучшей производительности."
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="Подробный режим"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="Записывать каждое посещение фронтенд-страницы, включая ответы с включённым кэшированием. При отключении записываются только обходы кэша, очистки, ошибки и изменения контента. Включайте временно для устранения неполадок, затем отключайте в продакшене."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Включить панель Debug"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Показывать панель отладки внизу каждой страницы администрирования, отображающую операции кэширования, произошедшие во время текущего запроса. Видна только администраторам."
PLG_SYSTEM_SGCACHE_LOG_FILE="Имя файла журнала"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Имя файла журнала внутри каталога логов Joomla. По умолчанию: sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Макс. размер журнала (МБ)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="Когда файл журнала превысит этот размер, он будет ротирован. Хранятся последние 5 ротированных файлов. По умолчанию: 5 МБ."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Просмотр журнала"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="Просмотр, скачивание, тестирование или очистка журнала кэширования."

; Log viewer / dashboard
PLG_SYSTEM_SGCACHE_LOG_VIEW="Просмотреть журнал"
PLG_SYSTEM_SGCACHE_LOG_VIEW_FULL="Открыть полный просмотрщик"
PLG_SYSTEM_SGCACHE_LOG_DOWNLOAD="Скачать"
PLG_SYSTEM_SGCACHE_LOG_CLEAR="Очистить"
PLG_SYSTEM_SGCACHE_LOG_TEST="Тест"
PLG_SYSTEM_SGCACHE_LOG_REFRESH="Обновить"
PLG_SYSTEM_SGCACHE_LOG_CLEAR_CONFIRM="Очистить все записи журнала? Это действие нельзя отменить."
PLG_SYSTEM_SGCACHE_LOG_NO_ENTRIES="Записей в журнале пока нет. Включите журналирование выше и выполните некоторые действия (сохраните статью, очистите кэш), чтобы увидеть записи здесь."
PLG_SYSTEM_SGCACHE_LOG_LOADING="Загрузка..."
PLG_SYSTEM_SGCACHE_LOG_SHOW_MORE="Показать больше"
PLG_SYSTEM_SGCACHE_LOG_SHOW_LESS="Показать меньше"

