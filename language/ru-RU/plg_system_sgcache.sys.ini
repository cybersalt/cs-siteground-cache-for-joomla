PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Интегрирует Joomla с серверной системой кэширования SiteGround. Автоматически очищает динамический кэш при изменении контента и устанавливает соответствующие заголовки кэширования.<br/><br/><small>Протокол взаимодействия с кэшем изучен из плагина <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> для WordPress от SiteGround (GPLv3). Код не копировался; это независимая реализация для Joomla. Не связано с SiteGround и не одобрено SiteGround.</small>"
