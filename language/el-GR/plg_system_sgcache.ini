PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Ενσωματώνει το Joomla με το σύστημα cache διακομιστή της SiteGround. Εκκαθαρίζει αυτόματα τη δυναμική cache όταν αλλάζει το περιεχόμενο και ορίζει τις κατάλληλες κεφαλίδες cache.<br/><br/><small>Το πρωτόκολλο επικοινωνίας cache βασίστηκε στο plugin <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> της SiteGround για WordPress (GPLv3). Δεν αντιγράφηκε κώδικας· πρόκειται για ανεξάρτητη υλοποίηση Joomla. Δεν σχετίζεται ούτε υποστηρίζεται από τη SiteGround.</small>"

; Fieldset labels
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Ρυθμίσεις Cache"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="Κουμπί Γραμμής Εργαλείων"
PLG_SYSTEM_SGCACHE_FIELDSET_LOGGING="Καταγραφή &amp; Αποσφαλμάτωση"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="Ρυθμίσεις για Προχωρημένους"

; Cache settings
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Ενεργοποίηση Δυναμικής Cache"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Ενεργοποίηση κεφαλίδων δυναμικής cache της SiteGround. Οι σελίδες θα επισημαίνονται ως αποθηκεύσιμες στην cache για τον reverse proxy της SiteGround."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Αυτόματη Εκκαθάριση κατά την Αλλαγή Περιεχομένου"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Αυτόματη εκκαθάριση σχετικών καταχωρήσεων cache όταν αποθηκεύεται, διαγράφεται ή αλλάζει κατάσταση το περιεχόμενο."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Όριο Εκκαθάρισης"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="Αν χρειάζεται εκκαθάριση περισσότερων URL από αυτόν τον αριθμό, θα εκτελεστεί πλήρης εκκαθάριση cache αντί για μεμονωμένη εκκαθάριση. Προεπιλογή: 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="Εξαιρούμενα URL"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Εισάγετε μία διαδρομή URL ανά γραμμή (σχετική με τη ρίζα του ιστότοπου) που δεν πρέπει ποτέ να αποθηκεύεται στην cache. Παράδειγμα: /administrator ή /my-private-page"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Εξαιρούμενα Components"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Επιλέξτε components των οποίων οι σελίδες δεν πρέπει ποτέ να αποθηκεύονται στην cache από τη SiteGround."

; Toolbar button settings
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Εμφάνιση Κουμπιού Εκκαθάρισης στη Διαχείριση"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Εμφάνιση κουμπιού 'Purge SG Cache' στην επάνω γραμμή της περιοχής διαχείρισης Joomla, ορατό σε κάθε σελίδα."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Λειτουργία Κουμπιού"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Απλό: ένα κουμπί που εκκαθαρίζει όλη την cache. Αναπτυσσόμενο: διαιρεμένο κουμπί με 'Εκκαθάριση Όλων' και επιλογές προσαρμοσμένων διαδρομών."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Απλό - Εκκαθάριση Όλων"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Αναπτυσσόμενο - Εκκαθάριση Όλων + Προσαρμοσμένες Διαδρομές"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Προσαρμοσμένες Διαδρομές Εκκαθάρισης"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="Μία καταχώρηση ανά γραμμή στη μορφή: Ετικέτα|/διαδρομή. Αυτές εμφανίζονται ως επιλογές στο αναπτυσσόμενο μενού. Παράδειγμα: Blog|/blog ή News Section|/news"

; Toolbar button labels
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Εκκαθάριση Όλης της Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="Εκκαθάριση Συγκεκριμένης Διαδρομής"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Εκκαθάριση..."

; Logging & debug settings
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Ενεργοποίηση Καταγραφής σε Αρχείο"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Καταγραφή λειτουργιών cache σε αρχείο καταγραφής στον κατάλογο logs του Joomla. Χρήσιμο για αντιμετώπιση προβλημάτων. Απενεργοποιήστε σε παραγωγή για βέλτιστη απόδοση."
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="Αναλυτική Λειτουργία"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="Καταγραφή κάθε επίσκεψης σελίδας frontend, συμπεριλαμβανομένων των απαντήσεων με ενεργοποιημένη cache. Όταν είναι απενεργοποιημένο, καταγράφονται μόνο οι παρακάμψεις cache, οι εκκαθαρίσεις, τα σφάλματα και οι αλλαγές περιεχομένου. Ενεργοποιήστε προσωρινά για αντιμετώπιση προβλημάτων, στη συνέχεια απενεργοποιήστε για παραγωγή."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Ενεργοποίηση Πάνελ Αποσφαλμάτωσης"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Εμφάνιση πάνελ αποσφαλμάτωσης στο κάτω μέρος κάθε σελίδας διαχείρισης που εμφανίζει τις λειτουργίες cache που πραγματοποιήθηκαν κατά το τρέχον αίτημα. Ορατό μόνο σε διαχειριστές."
PLG_SYSTEM_SGCACHE_LOG_FILE="Όνομα Αρχείου Καταγραφής"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Όνομα του αρχείου καταγραφής μέσα στον κατάλογο logs του Joomla. Προεπιλογή: sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Μέγιστο Μέγεθος Αρχείου Καταγραφής (MB)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="Όταν το αρχείο καταγραφής υπερβεί αυτό το μέγεθος, θα γίνει εναλλαγή. Διατηρούνται τα τελευταία 5 αρχεία εναλλαγής. Προεπιλογή: 5 MB."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Προβολή Αρχείου Καταγραφής"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="Προβολή, λήψη, δοκιμή ή εκκαθάριση του αρχείου καταγραφής cache."

; Log viewer / dashboard
PLG_SYSTEM_SGCACHE_LOG_VIEW="Προβολή Καταγραφής"
PLG_SYSTEM_SGCACHE_LOG_VIEW_FULL="Άνοιγμα Πλήρους Προβολής"
PLG_SYSTEM_SGCACHE_LOG_DOWNLOAD="Λήψη"
PLG_SYSTEM_SGCACHE_LOG_CLEAR="Εκκαθάριση"
PLG_SYSTEM_SGCACHE_LOG_TEST="Δοκιμή"
PLG_SYSTEM_SGCACHE_LOG_REFRESH="Ανανέωση"
PLG_SYSTEM_SGCACHE_LOG_CLEAR_CONFIRM="Εκκαθάριση όλων των καταχωρήσεων; Αυτή η ενέργεια δεν μπορεί να αναιρεθεί."
PLG_SYSTEM_SGCACHE_LOG_NO_ENTRIES="Δεν υπάρχουν ακόμα καταχωρήσεις. Ενεργοποιήστε την καταγραφή παραπάνω και εκτελέστε κάποιες ενέργειες (αποθήκευση άρθρου, εκκαθάριση cache) για να δείτε καταχωρήσεις εδώ."
PLG_SYSTEM_SGCACHE_LOG_LOADING="Φόρτωση..."
PLG_SYSTEM_SGCACHE_LOG_SHOW_MORE="Εμφάνιση Περισσότερων"
PLG_SYSTEM_SGCACHE_LOG_SHOW_LESS="Εμφάνιση Λιγότερων"

; Debug panel
PLG_SYSTEM_SGCACHE_DEBUG_PANEL_TITLE="SG Cache Debug"

; Advanced settings
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT="Διαφοροποίηση ανά User Agent"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Προσθήκη κεφαλίδας Vary: User-Agent για εξυπηρέτηση διαφορετικών αποθηκευμένων εκδόσεων για κινητά και επιτραπέζιους browsers."
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="Cache για Συνδεδεμένους Χρήστες"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="Επιτρέπεται η αποθήκευση στην cache για συνδεδεμένους χρήστες. ΠΡΟΣΟΧΗ: Μπορεί να εμφανίσει εσφαλμένο περιεχόμενο στους χρήστες. Ενεργοποιήστε μόνο αν ο ιστότοπός σας εμφανίζει το ίδιο περιεχόμενο σε όλους τους χρήστες."
PLG_SYSTEM_SGCACHE_PURGE_BUTTON="Χειροκίνητη Εκκαθάριση Cache"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON_DESC="Κάντε κλικ για χειροκίνητη εκκαθάριση όλης της cache της SiteGround."

; Purge messages
PLG_SYSTEM_SGCACHE_PURGE_ALL_CACHE="Εκκαθάριση Όλης της Cache"
PLG_SYSTEM_SGCACHE_PURGE_SUCCESS="Η cache της SiteGround εκκαθαρίστηκε επιτυχώς."
PLG_SYSTEM_SGCACHE_PURGE_PATH_SUCCESS="Η cache της SiteGround εκκαθαρίστηκε για τη διαδρομή: %s"
PLG_SYSTEM_SGCACHE_PURGE_FAILED="Αποτυχία εκκαθάρισης cache της SiteGround. Ελέγξτε ότι βρίσκεστε σε διακομιστή SiteGround."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND="Δεν εντοπίστηκε φιλοξενία SiteGround. Οι λειτουργίες cache δεν είναι διαθέσιμες."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND_NOTICE="Αυτός ο ιστότοπος δεν φαίνεται να φιλοξενείται στη SiteGround. Το plugin SiteGround Cache είναι ενεργοποιημένο αλλά όλες οι λειτουργίες cache είναι ανενεργές. Αν έχετε μεταφέρει αυτόν τον ιστότοπο από τη SiteGround, μπορείτε να απενεργοποιήσετε ή να απεγκαταστήσετε αυτό το plugin με ασφάλεια."
PLG_SYSTEM_SGCACHE_GO_TO_SETTINGS="Ρυθμίσεις Plugin"

