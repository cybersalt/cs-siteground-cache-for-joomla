PLG_SYSTEM_SGCACHE_VARY_USER_AGENT="Różnicowanie wg User Agent"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Dodaje nagłówek Vary: User-Agent aby serwować różne wersje cache dla przeglądarek mobilnych i desktopowych."
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="Cache dla zalogowanych użytkowników"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="Zezwól na buforowanie dla zalogowanych użytkowników. UWAGA: Może wyświetlać nieprawidłową treść użytkownikom. Włącz tylko jeśli Twoja strona wyświetla tę samą treść wszystkim użytkownikom."
