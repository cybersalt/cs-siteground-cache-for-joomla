PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Integruje Joomla z serwerowym systemem cache SiteGround. Automatycznie czyści dynamiczny cache po zmianie treści i ustawia odpowiednie nagłówki cache.<br/><br/><small>Protokół komunikacji cache poznany z pluginu <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> dla WordPress od SiteGround (GPLv3). Żaden kod nie został skopiowany; jest to niezależna implementacja dla Joomla. Nie jest powiązane z SiteGround ani przez SiteGround zatwierdzone.</small>"

; Fieldset labels
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Ustawienia Cache"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="Przycisk paska narzędzi"
PLG_SYSTEM_SGCACHE_FIELDSET_LOGGING="Logowanie &amp; Debug"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="Ustawienia zaawansowane"

; Cache settings
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Włącz dynamiczny cache"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Włącza nagłówki dynamicznego cache SiteGround. Strony zostaną oznaczone jako możliwe do buforowania dla reverse proxy SiteGround."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Automatyczne czyszczenie przy zmianie treści"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Automatycznie czyść powiązane wpisy cache gdy treść jest zapisywana, usuwana lub zmienia się jej stan."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Próg czyszczenia"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="Jeśli liczba URL wymagających czyszczenia przekroczy tę wartość, zostanie wykonane pełne czyszczenie cache zamiast czyszczenia indywidualnego. Domyślnie: 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="Wykluczone URL"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Wpisz jedną ścieżkę URL na linię (względem katalogu głównego strony), która nigdy nie powinna być buforowana. Przykład: /administrator lub /moja-prywatna-strona"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Wykluczone komponenty"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Wybierz komponenty, których strony nigdy nie powinny być buforowane przez SiteGround."

; Toolbar button settings
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Pokaż przycisk czyszczenia w panelu admina"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Wyświetla przycisk 'Purge SG Cache' na górnym pasku panelu administracyjnego Joomla, widoczny na każdej stronie."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Tryb przycisku"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Prosty: jeden przycisk czyszczący cały cache. Dropdown: przycisk podzielony z opcją 'Wyczyść wszystko' oraz niestandardowymi ścieżkami."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Prosty - Wyczyść wszystko"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Dropdown - Wyczyść wszystko + Niestandardowe ścieżki"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Niestandardowe ścieżki czyszczenia"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="Jeden wpis na linię w formacie: Etykieta|/ścieżka. Pojawiają się jako opcje w dropdown. Przykład: Blog|/blog lub Aktualności|/aktualnosci"

; Toolbar button labels
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Wyczyść cały cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="Wyczyść określoną ścieżkę"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Czyszczenie..."

; Logging & debug settings
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Włącz logowanie do pliku"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Zapisuje operacje cache do pliku logów w katalogu logów Joomla. Przydatne do rozwiązywania problemów. Wyłącz na produkcji dla najlepszej wydajności."
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="Tryb szczegółowy"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="Loguj każdą wizytę na stronie frontend, w tym odpowiedzi z włączonym cache. Po wyłączeniu logowane są tylko pominięcia cache, czyszczenia, błędy i zmiany treści. Włącz tymczasowo do rozwiązywania problemów, potem wyłącz na produkcji."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Włącz panel Debug"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Wyświetla panel debugowania na dole każdej strony administracyjnej pokazujący operacje cache, które wystąpiły podczas bieżącego żądania. Widoczny tylko dla administratorów."
PLG_SYSTEM_SGCACHE_LOG_FILE="Nazwa pliku logów"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Nazwa pliku logów w katalogu logów Joomla. Domyślnie: sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Maks. rozmiar logów (MB)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="Gdy plik logów przekroczy ten rozmiar, zostanie zrotowany. Przechowuje ostatnie 5 zrotowanych plików. Domyślnie: 5 MB."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Przeglądarka logów"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="Przeglądaj, pobieraj, testuj lub czyść log cache."

