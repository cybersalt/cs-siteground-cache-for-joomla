PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Integrates Joomla with SiteGround's server-side caching system. Automatically purges dynamic cache when content changes and sets appropriate cache headers."

; Fieldset labels
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Cache Settings"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="Toolbar Button"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="Advanced Settings"

; Cache settings
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Enable Dynamic Cache"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Enable SiteGround dynamic cache headers. Pages will be marked as cacheable for SiteGround's reverse proxy."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Auto-Purge on Content Change"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Automatically purge related cache entries when content is saved, deleted, or state changed."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Purge Threshold"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="If more than this number of URLs need purging, a full cache flush will be performed instead of purging individually. Default: 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="Excluded URLs"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Enter one URL path per line (relative to site root) that should never be cached. Example: /administrator or /my-private-page"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Excluded Components"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Enter one component name per line (e.g. com_users) whose pages should never be cached."

; Toolbar button settings
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Show Purge Button in Admin"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Display a 'Purge SG Cache' button in the top bar of the Joomla administrator area, visible on every page."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Button Mode"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Simple: one button that purges all cache. Dropdown: a split button with 'Purge All' plus custom path options."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Simple - Purge All"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Dropdown - Purge All + Custom Paths"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Custom Purge Paths"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="One entry per line in the format: Label|/path. These appear as options in the dropdown. Example: Blog|/blog or News Section|/news"

; Toolbar button labels
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Purge All Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="Purge Specific Path"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Purging..."

; Advanced settings
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT="Vary by User Agent"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Add Vary: User-Agent header to serve different cached versions for mobile and desktop browsers."
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="Cache for Logged-in Users"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="Allow caching for logged-in users. WARNING: May show incorrect content to users. Only enable if your site serves the same content to all users."
PLG_SYSTEM_SGCACHE_PURGE_BUTTON="Manual Cache Purge"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON_DESC="Click to manually purge all SiteGround cache."

; Purge messages
PLG_SYSTEM_SGCACHE_PURGE_ALL_CACHE="Purge All Cache"
PLG_SYSTEM_SGCACHE_PURGE_SUCCESS="SiteGround cache has been purged successfully."
PLG_SYSTEM_SGCACHE_PURGE_PATH_SUCCESS="SiteGround cache purged for path: %s"
PLG_SYSTEM_SGCACHE_PURGE_FAILED="Failed to purge SiteGround cache. Check that you are on a SiteGround server."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND="SiteGround hosting not detected. Cache operations are not available."

; AJAX messages
PLG_SYSTEM_SGCACHE_ACCESS_DENIED="Access denied."
PLG_SYSTEM_SGCACHE_INVALID_TOKEN="Invalid security token."
PLG_SYSTEM_SGCACHE_INVALID_ACTION="Invalid action."
