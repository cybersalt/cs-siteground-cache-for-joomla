; Logging & debug settings
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Enable File Logging"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Write cache operations to a log file in your Joomla logs directory. Useful for troubleshooting. Disable in production for best performance."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Enable Debug Panel"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Show a debug panel at the bottom of every admin page displaying cache operations that occurred during the current request. Only visible to administrators."
PLG_SYSTEM_SGCACHE_LOG_FILE="Log Filename"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Name of the log file inside Joomla's logs directory. Default: sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Max Log Size (MB)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="When the log file exceeds this size, it will be rotated. Keeps the last 5 rotated files. Default: 5 MB."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Log Viewer"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="View, download, test, or clear the cache log."

