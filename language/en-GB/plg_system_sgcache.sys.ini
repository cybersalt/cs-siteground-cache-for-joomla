PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Integrates Joomla with SiteGround's server-side caching system. Automatically purges dynamic cache when content changes and sets appropriate cache headers.<br/><br/><small>Cache communication protocol learned from SiteGround's <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> plugin for WordPress (GPLv3). No code was copied; this is an independent Joomla implementation. Not affiliated with or endorsed by SiteGround.</small>"

; Post-install messages
PLG_SYSTEM_SGCACHE_POSTINSTALL_INSTALLED="SiteGround Cache plugin has been successfully installed. Enable it and configure settings."
PLG_SYSTEM_SGCACHE_POSTINSTALL_UPDATED="SiteGround Cache plugin has been successfully updated."
PLG_SYSTEM_SGCACHE_POSTINSTALL_OPEN="Open SiteGround Cache Settings"
PLG_SYSTEM_SGCACHE_POSTINSTALL_NOT_SITEGROUND="Warning: SiteGround hosting not detected. This plugin only works on SiteGround servers."

; Toolbar button (shown on every admin page)
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Purge All Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Purging..."

; Purge result messages (shown after toolbar button click)
PLG_SYSTEM_SGCACHE_PURGE_SUCCESS="SiteGround cache has been purged successfully."
PLG_SYSTEM_SGCACHE_PURGE_PATH_SUCCESS="SiteGround cache purged for path: %s"
PLG_SYSTEM_SGCACHE_PURGE_FAILED="Failed to purge SiteGround cache. Check that you are on a SiteGround server."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND="SiteGround hosting not detected. Cache operations are not available."

; Non-SiteGround admin notice
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND_NOTICE="This site does not appear to be hosted on SiteGround. The SiteGround Cache plugin is enabled but all cache operations are inactive. If you have migrated this site from SiteGround, you can safely disable or uninstall this plugin."
PLG_SYSTEM_SGCACHE_GO_TO_SETTINGS="Plugin Settings"

