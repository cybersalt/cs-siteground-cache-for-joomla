PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="JoomlaをSiteGroundのサーバーサイドcacheシステムと統合します。コンテンツが変更されるとダイナミックcacheを自動的にパージし、適切なcacheヘッダーを設定します。<br/><br/><small>Cache通信プロトコルはSiteGroundのWordPress用<a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a>プラグイン（GPLv3）から学習しました。コードのコピーは行っていません。これは独立したJoomla実装です。SiteGroundとの提携や承認はありません。</small>"
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Cache設定"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="ツールバーボタン"
PLG_SYSTEM_SGCACHE_FIELDSET_LOGGING="ログ &amp; デバッグ"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="詳細設定"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="ダイナミックcacheを有効にする"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="SiteGroundダイナミックcacheヘッダーを有効にします。ページはSiteGroundのリバースプロキシでcache可能としてマークされます。"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="コンテンツ変更時の自動パージ"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="コンテンツの保存、削除、または状態変更時に関連するcacheエントリを自動的にパージします。"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="パージしきい値"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="パージが必要なURLの数がこの値を超えると、個別にパージする代わりにcache全体のフラッシュが実行されます。デフォルト：10。"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="除外URL"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="cacheしないURLパスを1行に1つ入力してください（サイトルートからの相対パス）。例：/administrator または /my-private-page"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="除外コンポーネント"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="SiteGroundでcacheしないコンポーネントを選択してください。"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="管理画面にパージボタンを表示"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Joomla管理画面の上部バーに「Purge SG Cache」ボタンを表示し、すべてのページで表示されます。"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="ボタンモード"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="シンプル：すべてのcacheをパージする1つのボタン。ドロップダウン：「すべてパージ」とカスタムパスオプションを持つ分割ボタン。"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="シンプル - すべてパージ"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="ドロップダウン - すべてパージ + カスタムパス"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="カスタムパージパス"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="1行に1つ、ラベル|/パス の形式で入力してください。ドロップダウンのオプションとして表示されます。例：ブログ|/blog または ニュースセクション|/news"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="すべてのcacheをパージ"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="特定パスのパージ"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="パージ中..."
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="ファイルログを有効にする"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="cache操作をJoomlaのログディレクトリ内のログファイルに書き込みます。トラブルシューティングに便利です。本番環境では最高のパフォーマンスのために無効にしてください。"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="詳細モード"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="cache有効レスポンスを含むすべてのフロントエンドページ訪問をログに記録します。オフの場合、cacheバイパス、パージ、エラー、コンテンツ変更のみがログに記録されます。トラブルシューティング時に一時的にオンにし、本番環境ではオフにしてください。"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="デバッグパネルを有効にする"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="すべての管理ページの下部に、現在のリクエスト中に発生したcache操作を表示するデバッグパネルを表示します。管理者のみに表示されます。"
PLG_SYSTEM_SGCACHE_LOG_FILE="ログファイル名"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Joomlaのログディレクトリ内のログファイル名。デフォルト：sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="最大ログサイズ（MB）"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="ログファイルがこのサイズを超えるとローテーションされます。最後の5つのローテーションファイルが保持されます。デフォルト：5 MB。"
PLG_SYSTEM_SGCACHE_LOG_VIEWER="ログビューア"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="cacheログの表示、ダウンロード、テスト、またはクリアを行います。"
PLG_SYSTEM_SGCACHE_LOG_VIEW="ログを表示"
PLG_SYSTEM_SGCACHE_LOG_VIEW_FULL="フルビューアを開く"
PLG_SYSTEM_SGCACHE_LOG_DOWNLOAD="ダウンロード"
PLG_SYSTEM_SGCACHE_LOG_CLEAR="クリア"
PLG_SYSTEM_SGCACHE_LOG_TEST="テスト"
PLG_SYSTEM_SGCACHE_LOG_REFRESH="更新"
PLG_SYSTEM_SGCACHE_LOG_CLEAR_CONFIRM="すべてのログエントリをクリアしますか？この操作は元に戻せません。"
PLG_SYSTEM_SGCACHE_LOG_NO_ENTRIES="まだログエントリがありません。上記のログを有効にして、いくつかの操作（記事の保存、cacheのパージ）を実行すると、ここにエントリが表示されます。"
PLG_SYSTEM_SGCACHE_LOG_LOADING="読み込み中..."
PLG_SYSTEM_SGCACHE_LOG_SHOW_MORE="もっと表示"
PLG_SYSTEM_SGCACHE_LOG_SHOW_LESS="表示を減らす"
PLG_SYSTEM_SGCACHE_DEBUG_PANEL_TITLE="SG Cache デバッグ"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT="ユーザーエージェントで分類"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Vary: User-Agentヘッダーを追加して、モバイルとデスクトップブラウザに異なるcacheバージョンを提供します。"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="ログインユーザーのcache"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="ログインユーザーのcacheを許可します。警告：ユーザーに不正確なコンテンツが表示される可能性があります。サイトがすべてのユーザーに同じコンテンツを提供する場合にのみ有効にしてください。"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON="手動cacheパージ"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON_DESC="クリックしてすべてのSiteGround cacheを手動でパージします。"
PLG_SYSTEM_SGCACHE_PURGE_ALL_CACHE="すべてのcacheをパージ"
PLG_SYSTEM_SGCACHE_PURGE_SUCCESS="SiteGround cacheが正常にパージされました。"
PLG_SYSTEM_SGCACHE_PURGE_PATH_SUCCESS="SiteGround cacheがパスに対してパージされました：%s"
PLG_SYSTEM_SGCACHE_PURGE_FAILED="SiteGround cacheのパージに失敗しました。SiteGroundサーバー上にいることを確認してください。"
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND="SiteGroundホスティングが検出されませんでした。cache操作は利用できません。"
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND_NOTICE="このサイトはSiteGroundでホストされていないようです。SiteGround Cache pluginは有効ですが、すべてのcache操作は無効です。このサイトをSiteGroundから移行した場合は、このpluginを安全に無効化またはアンインストールできます。"
