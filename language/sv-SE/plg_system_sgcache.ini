; Logging & debug settings
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Aktivera Filloggning"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Skriv cache-operationer till en loggfil i Joomlas loggkatalog. Användbart för felsökning. Inaktivera i produktion för bästa prestanda."
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="Detaljerat Läge"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="Logga varje besök på frontend-sidor inklusive cache-aktiverade svar. När det är avstängt loggas bara cache-förbigåenden, rensningar, fel och innehållsändringar. Aktivera tillfälligt för felsökning, stäng sedan av för produktion."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Aktivera Felsökningspanel"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Visa en felsökningspanel längst ner på varje administrationssida som visar cache-operationer som inträffade under den aktuella förfrågan. Synlig endast för administratörer."
PLG_SYSTEM_SGCACHE_LOG_FILE="Loggfilnamn"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Namn på loggfilen i Joomlas loggkatalog. Standard: sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Max Loggstorlek (MB)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="När loggfilen överstiger denna storlek kommer den att roteras. Behåller de senaste 5 roterade filerna. Standard: 5 MB."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Loggvisare"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="Visa, ladda ner, testa eller rensa cache-loggen."

