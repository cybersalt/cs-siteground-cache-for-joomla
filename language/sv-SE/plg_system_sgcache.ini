PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Integrerar Joomla med SiteGrounds cache-system på serversidan. Rensar automatiskt dynamisk cache när innehåll ändras och sätter lämpliga cache-headers.<br/><br/><small>Cache-kommunikationsprotokollet har lärts från SiteGrounds <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a>-plugin för WordPress (GPLv3). Ingen kod kopierades; detta är en oberoende Joomla-implementation. Ej ansluten till eller godkänd av SiteGround.</small>"

