; Cache settings
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Aktivera Dynamisk Cache"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Aktivera SiteGrounds dynamiska cache-headers. Sidor markeras som cachebara för SiteGrounds reverse proxy."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Automatisk Rensning vid Innehållsändring"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Rensa automatiskt relaterade cache-poster när innehåll sparas, tas bort eller ändrar status."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Rensningströskel"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="Om fler URL behöver rensas än detta antal, utförs en fullständig cache-rensning istället för individuell rensning. Standard: 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="Exkluderade URL"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Ange en URL-sökväg per rad (relativ till webbplatsens rot) som aldrig ska cachelagras. Exempel: /administrator eller /my-private-page"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Exkluderade Komponenter"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Välj komponenter vars sidor aldrig ska cachelagras av SiteGround."

; Toolbar button settings
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Visa Rensningsknapp i Administrationen"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Visa en 'Purge SG Cache'-knapp i toppfältet i Joomlas administrationsområde, synlig på varje sida."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Knappläge"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Enkel: en knapp som rensar all cache. Rullgardin: en delad knapp med 'Rensa Allt' plus anpassade sökvägsalternativ."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Enkel - Rensa Allt"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Rullgardin - Rensa Allt + Anpassade Sökvägar"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Anpassade Rensningssökvägar"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="En post per rad i formatet: Etikett|/sökväg. Dessa visas som alternativ i rullgardinsmenyn. Exempel: Blog|/blog eller News Section|/news"

