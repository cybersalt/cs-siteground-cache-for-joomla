PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Joomla'yı SiteGround'un sunucu taraflı cache sistemiyle entegre eder. İçerik değiştiğinde dinamik cache'i otomatik olarak temizler ve uygun cache başlıklarını ayarlar.<br/><br/><small>Cache iletişim protokolü SiteGround'un WordPress için <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> eklentisinden (GPLv3) öğrenilmiştir. Kod kopyalanmamıştır; bu bağımsız bir Joomla uygulamasıdır. SiteGround ile bağlantılı veya onaylanmış değildir.</small>"
