PLG_SYSTEM_SGCACHE_LOG_CLEAR="Löschen"
PLG_SYSTEM_SGCACHE_LOG_TEST="Testen"
PLG_SYSTEM_SGCACHE_LOG_REFRESH="Aktualisieren"
PLG_SYSTEM_SGCACHE_LOG_CLEAR_CONFIRM="Alle Protokolleinträge löschen? Dies kann nicht rückgängig gemacht werden."
PLG_SYSTEM_SGCACHE_LOG_NO_ENTRIES="Noch keine Protokolleinträge. Aktivieren Sie die Protokollierung oben und führen Sie einige Aktionen aus (Artikel speichern, Cache leeren), um hier Einträge zu sehen."
PLG_SYSTEM_SGCACHE_LOG_LOADING="Wird geladen..."
