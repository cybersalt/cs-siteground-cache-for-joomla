PLG_SYSTEM_SGCACHE_NOT_SITEGROUND="SiteGround-Hosting nicht erkannt. Cache-Vorgänge sind nicht verfügbar."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND_NOTICE="Diese Website scheint nicht bei SiteGround gehostet zu sein. Das SiteGround Cache Plugin ist aktiviert, aber alle Cache-Vorgänge sind inaktiv. Wenn Sie diese Website von SiteGround migriert haben, können Sie dieses Plugin sicher deaktivieren oder deinstallieren."
