PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Fügt den Vary: User-Agent Header hinzu, um verschiedene gecachete Versionen für mobile und Desktop-Browser bereitzustellen."
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="Cache für angemeldete Benutzer"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="Caching für angemeldete Benutzer erlauben. WARNUNG: Kann Benutzern falsche Inhalte anzeigen. Nur aktivieren, wenn Ihre Website allen Benutzern denselben Inhalt anzeigt."
PLG_SYSTEM_SGCACHE_PURGE_BUTTON="Manuelles Cache-Leeren"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON_DESC="Klicken Sie, um den gesamten SiteGround Cache manuell zu leeren."
PLG_SYSTEM_SGCACHE_PURGE_ALL_CACHE="Gesamten Cache leeren"
PLG_SYSTEM_SGCACHE_PURGE_SUCCESS="SiteGround Cache wurde erfolgreich geleert."
