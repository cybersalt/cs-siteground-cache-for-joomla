PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Integriert Joomla mit dem serverseitigen Cache-System von SiteGround. Löscht automatisch den dynamischen Cache bei Inhaltsänderungen und setzt die entsprechenden Cache-Header.<br/><br/><small>Cache-Kommunikationsprotokoll erlernt aus SiteGround's <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> Plugin für WordPress (GPLv3). Es wurde kein Code kopiert; dies ist eine unabhängige Joomla-Implementierung. Nicht mit SiteGround verbunden oder von SiteGround unterstützt.</small>"
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Cache-Einstellungen"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="Symbolleisten-Schaltfläche"
PLG_SYSTEM_SGCACHE_FIELDSET_LOGGING="Protokollierung &amp; Debug"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="Erweiterte Einstellungen"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Dynamischen Cache aktivieren"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Aktiviert die dynamischen Cache-Header von SiteGround. Seiten werden als cachefähig für den Reverse Proxy von SiteGround markiert."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Automatisches Leeren bei Inhaltsänderung"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Automatisch zugehörige Cache-Einträge leeren, wenn Inhalte gespeichert, gelöscht oder der Status geändert wird."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Löschschwelle"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="Wenn mehr als diese Anzahl an URL's gelöscht werden müssen, wird statt einzelner Löschung ein vollständiger Cache-Flush durchgeführt. Standard: 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="Ausgeschlossene URL's"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Geben Sie einen URL-Pfad pro Zeile ein (relativ zum Site-Root), der niemals gecachet werden soll. Beispiel: /administrator oder /meine-private-seite"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Ausgeschlossene Komponenten"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Wählen Sie Komponenten aus, deren Seiten niemals von SiteGround gecachet werden sollen."
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Lösch-Schaltfläche im Adminbereich anzeigen"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Zeigt eine 'Purge SG Cache'-Schaltfläche in der oberen Leiste des Joomla-Administrationsbereichs an, sichtbar auf jeder Seite."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Schaltflächenmodus"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Einfach: eine Schaltfläche, die den gesamten Cache leert. Dropdown: eine geteilte Schaltfläche mit 'Alles leeren' plus benutzerdefinierte Pfadoptionen."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Einfach - Alles leeren"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Dropdown - Alles leeren + Benutzerdefinierte Pfade"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Benutzerdefinierte Löschpfade"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="Ein Eintrag pro Zeile im Format: Label|/pfad. Diese erscheinen als Optionen im Dropdown. Beispiel: Blog|/blog oder Nachrichtenbereich|/nachrichten"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Gesamten Cache leeren"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="Bestimmten Pfad leeren"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Wird geleert..."
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Dateiprotokollierung aktivieren"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Schreibt Cache-Vorgänge in eine Protokolldatei im Joomla-Protokollverzeichnis. Nützlich zur Fehlerbehebung. Deaktivieren Sie dies in der Produktion für beste Leistung."
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="Ausführlicher Modus"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="Protokolliert jeden Frontend-Seitenaufruf einschließlich cache-aktivierter Antworten. Wenn deaktiviert, werden nur Cache-Umgehungen, Löschvorgänge, Fehler und Inhaltsänderungen protokolliert. Vorübergehend zur Fehlerbehebung aktivieren, dann für die Produktion deaktivieren."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Debug-Panel aktivieren"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Zeigt ein Debug-Panel am unteren Rand jeder Administrationsseite an, das Cache-Vorgänge des aktuellen Requests anzeigt. Nur für Administratoren sichtbar."
PLG_SYSTEM_SGCACHE_LOG_FILE="Protokolldateiname"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Name der Protokolldatei im Protokollverzeichnis von Joomla. Standard: sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Maximale Protokollgröße (MB)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="Wenn die Protokolldatei diese Größe überschreitet, wird sie rotiert. Behält die letzten 5 rotierten Dateien. Standard: 5 MB."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Protokollanzeige"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="Cache-Protokoll anzeigen, herunterladen, testen oder löschen."
PLG_SYSTEM_SGCACHE_LOG_VIEW="Protokoll anzeigen"
PLG_SYSTEM_SGCACHE_LOG_VIEW_FULL="Vollständige Ansicht öffnen"
