PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Integruje Joomla se systémem cache na straně serveru SiteGround. Automaticky promazává dynamickou cache při změně obsahu a nastavuje příslušné hlavičky cache.<br/><br/><small>Komunikační protokol cache byl odvozen z pluginu <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> od SiteGround pro WordPress (GPLv3). Žádný kód nebyl zkopírován; jedná se o nezávislou implementaci pro Joomla. Není spojeno s ani schváleno společností SiteGround.</small>"

; Fieldset labels
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Nastavení Cache"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="Tlačítko Panelu Nástrojů"
PLG_SYSTEM_SGCACHE_FIELDSET_LOGGING="Protokolování &amp; Ladění"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="Pokročilá Nastavení"

; Cache settings
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Povolit Dynamickou Cache"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Povolit hlavičky dynamické cache SiteGround. Stránky budou označeny jako uložitelné do cache pro reverzní proxy SiteGround."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Automatické Promazání při Změně Obsahu"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Automaticky promazat související položky cache při uložení, smazání nebo změně stavu obsahu."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Práh Promazání"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="Pokud je potřeba promazat více URL než tento počet, provede se úplné vymazání cache místo jednotlivého promazání. Výchozí: 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="Vyloučená URL"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Zadejte jednu cestu URL na řádek (relativní ke kořeni webu), která se nikdy nemá ukládat do cache. Příklad: /administrator nebo /my-private-page"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Vyloučené Komponenty"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Vyberte komponenty, jejichž stránky se nikdy nemají ukládat do cache SiteGround."

; Toolbar button settings
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Zobrazit Tlačítko Promazání v Administraci"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Zobrazit tlačítko 'Purge SG Cache' v horní liště administrace Joomla, viditelné na každé stránce."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Režim Tlačítka"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Jednoduché: jedno tlačítko, které promaže veškerou cache. Rozbalovací: rozdělené tlačítko s 'Promazat Vše' a volbami vlastních cest."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Jednoduché - Promazat Vše"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Rozbalovací - Promazat Vše + Vlastní Cesty"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Vlastní Cesty Promazání"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="Jeden záznam na řádek ve formátu: Popisek|/cesta. Tyto se zobrazí jako volby v rozbalovacím menu. Příklad: Blog|/blog nebo News Section|/news"

; Toolbar button labels
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Promazat Veškerou Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="Promazat Konkrétní Cestu"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Promazávání..."

; Logging & debug settings
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Povolit Protokolování do Souboru"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Zapisovat operace cache do souboru protokolu v adresáři logs Joomla. Užitečné pro řešení problémů. V produkci vypněte pro nejlepší výkon."
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="Podrobný Režim"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="Protokolovat každou návštěvu stránky na frontendu včetně odpovědí s povolenou cache. Pokud je vypnuto, protokolují se pouze obcházení cache, promazání, chyby a změny obsahu. Zapněte dočasně pro řešení problémů, poté vypněte pro produkci."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Povolit Panel Ladění"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Zobrazit panel ladění ve spodní části každé stránky administrace zobrazující operace cache, které proběhly během aktuálního požadavku. Viditelné pouze pro administrátory."
PLG_SYSTEM_SGCACHE_LOG_FILE="Název Souboru Protokolu"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Název souboru protokolu uvnitř adresáře logs Joomla. Výchozí: sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Maximální Velikost Protokolu (MB)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="Když soubor protokolu překročí tuto velikost, bude rotován. Uchovává posledních 5 rotovaných souborů. Výchozí: 5 MB."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Prohlížeč Protokolu"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="Zobrazit, stáhnout, otestovat nebo vymazat protokol cache."

