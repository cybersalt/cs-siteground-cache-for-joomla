PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Přidat hlavičku Vary: User-Agent pro poskytování různých verzí cache pro mobilní a desktopové prohlížeče."
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="Cache pro Přihlášené Uživatele"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="Povolit ukládání do cache pro přihlášené uživatele. VAROVÁNÍ: Může zobrazit nesprávný obsah uživatelům. Povolte pouze pokud váš web zobrazuje stejný obsah všem uživatelům."
PLG_SYSTEM_SGCACHE_PURGE_BUTTON="Ruční Promazání Cache"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON_DESC="Klikněte pro ruční promazání veškeré cache SiteGround."

