PLG_SYSTEM_SGCACHE="Sistema - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Integra Joomla con el sistema de cache del lado del servidor de SiteGround. Purga automáticamente la cache dinámica cuando el contenido cambia y establece los encabezados de cache apropiados.<br/><br/><small>Protocolo de comunicación de cache aprendido del plugin <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> de SiteGround para WordPress (GPLv3). No se copió ningún código; esta es una implementación independiente para Joomla. No afiliado ni respaldado por SiteGround.</small>"
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Configuración de cache"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="Botón de barra de herramientas"
PLG_SYSTEM_SGCACHE_FIELDSET_LOGGING="Registro &amp; Debug"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="Configuración avanzada"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Activar cache dinámica"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Activa los encabezados de cache dinámica de SiteGround. Las páginas serán marcadas como cacheables para el proxy inverso de SiteGround."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Purga automática al cambiar contenido"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Purgar automáticamente las entradas de cache relacionadas cuando el contenido se guarda, elimina o cambia de estado."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Umbral de purga"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="Si se necesita purgar más de esta cantidad de URL's, se realizará una limpieza completa de cache en lugar de purgar individualmente. Predeterminado: 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="URL's excluidas"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Introduzca una ruta de URL por línea (relativa a la raíz del sitio) que nunca debe ser cacheada. Ejemplo: /administrator o /mi-pagina-privada"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Componentes excluidos"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Seleccione los componentes cuyas páginas nunca deben ser cacheadas por SiteGround."
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Mostrar botón de purga en administración"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Muestra un botón 'Purge SG Cache' en la barra superior del área de administración de Joomla, visible en cada página."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Modo del botón"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Simple: un botón que purga toda la cache. Dropdown: un botón dividido con 'Purgar todo' más opciones de rutas personalizadas."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Simple - Purgar todo"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Dropdown - Purgar todo + Rutas personalizadas"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Rutas de purga personalizadas"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="Una entrada por línea en el formato: Etiqueta|/ruta. Estas aparecen como opciones en el dropdown. Ejemplo: Blog|/blog o Sección de noticias|/noticias"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Purgar toda la cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="Purgar ruta específica"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Purgando..."
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Activar registro en archivo"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Escribe las operaciones de cache en un archivo de registro en el directorio de registros de Joomla. Útil para la resolución de problemas. Desactive en producción para el mejor rendimiento."
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="Modo detallado"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="Registra cada visita de página del frontend incluyendo respuestas con cache habilitada. Cuando está desactivado, solo se registran omisiones de cache, purgas, errores y cambios de contenido. Active temporalmente para resolver problemas, luego desactive para producción."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Activar panel de debug"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Muestra un panel de debug en la parte inferior de cada página de administración con las operaciones de cache que ocurrieron durante la solicitud actual. Solo visible para administradores."
PLG_SYSTEM_SGCACHE_LOG_FILE="Nombre del archivo de registro"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Nombre del archivo de registro dentro del directorio de registros de Joomla. Predeterminado: sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Tamaño máximo del registro (MB)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="Cuando el archivo de registro excede este tamaño, será rotado. Conserva los últimos 5 archivos rotados. Predeterminado: 5 MB."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Visor de registro"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="Ver, descargar, probar o borrar el registro de cache."
PLG_SYSTEM_SGCACHE_LOG_VIEW="Ver registro"
PLG_SYSTEM_SGCACHE_LOG_VIEW_FULL="Abrir visor completo"
PLG_SYSTEM_SGCACHE_LOG_DOWNLOAD="Descargar"
PLG_SYSTEM_SGCACHE_LOG_CLEAR="Borrar"
PLG_SYSTEM_SGCACHE_LOG_TEST="Probar"
PLG_SYSTEM_SGCACHE_LOG_REFRESH="Actualizar"
PLG_SYSTEM_SGCACHE_LOG_CLEAR_CONFIRM="¿Borrar todas las entradas del registro? Esta acción no se puede deshacer."
PLG_SYSTEM_SGCACHE_LOG_NO_ENTRIES="Aún no hay entradas en el registro. Active el registro arriba y realice algunas acciones (guardar un artículo, purgar cache) para ver entradas aquí."
PLG_SYSTEM_SGCACHE_LOG_LOADING="Cargando..."
PLG_SYSTEM_SGCACHE_LOG_SHOW_MORE="Mostrar más"
PLG_SYSTEM_SGCACHE_LOG_SHOW_LESS="Mostrar menos"
