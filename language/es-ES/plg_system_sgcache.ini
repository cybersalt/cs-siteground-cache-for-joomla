PLG_SYSTEM_SGCACHE_VARY_USER_AGENT="Variar por User Agent"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Añade el encabezado Vary: User-Agent para servir diferentes versiones cacheadas para navegadores móviles y de escritorio."
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="Cache para usuarios conectados"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="Permitir cache para usuarios conectados. ADVERTENCIA: Puede mostrar contenido incorrecto a los usuarios. Solo active si su sitio muestra el mismo contenido a todos los usuarios."
PLG_SYSTEM_SGCACHE_PURGE_BUTTON="Purga manual de cache"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON_DESC="Haga clic para purgar manualmente toda la cache de SiteGround."
PLG_SYSTEM_SGCACHE_PURGE_ALL_CACHE="Purgar toda la cache"
PLG_SYSTEM_SGCACHE_PURGE_SUCCESS="La cache de SiteGround se ha purgado correctamente."
PLG_SYSTEM_SGCACHE_PURGE_PATH_SUCCESS="Cache de SiteGround purgada para la ruta: %s"
PLG_SYSTEM_SGCACHE_PURGE_FAILED="Error al purgar la cache de SiteGround. Compruebe que está en un servidor de SiteGround."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND="Alojamiento SiteGround no detectado. Las operaciones de cache no están disponibles."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND_NOTICE="Este sitio no parece estar alojado en SiteGround. El plugin SiteGround Cache está habilitado pero todas las operaciones de cache están inactivas. Si ha migrado este sitio desde SiteGround, puede desactivar o desinstalar este plugin de forma segura."
