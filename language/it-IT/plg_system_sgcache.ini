PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Integra Joomla con il sistema di cache lato server di SiteGround. Svuota automaticamente la cache dinamica quando il contenuto cambia e imposta le intestazioni di cache appropriate.<br/><br/><small>Protocollo di comunicazione della cache appreso dallo <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> plugin per WordPress di SiteGround (GPLv3). Nessun codice è stato copiato; questa è un'implementazione Joomla indipendente. Non affiliato con e non approvato da SiteGround.</small>"

; Fieldset labels
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Impostazioni Cache"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="Pulsante Barra degli strumenti"
PLG_SYSTEM_SGCACHE_FIELDSET_LOGGING="Registrazione &amp; Debug"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="Impostazioni Avanzate"

; Cache settings
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Abilita Cache Dinamica"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Abilita le intestazioni della cache dinamica di SiteGround. Le pagine saranno contrassegnate come memorizzabili nella cache per il reverse proxy di SiteGround."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Svuotamento Automatico alla Modifica del Contenuto"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Svuota automaticamente le voci della cache correlate quando il contenuto viene salvato, eliminato o lo stato viene modificato."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Soglia di Svuotamento"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="Se il numero di URL da svuotare supera questo valore, verrà eseguito uno svuotamento completo della cache anziché uno svuotamento individuale. Predefinito: 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="URL Esclusi"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Inserisci un percorso URL per riga (relativo alla radice del sito) che non deve mai essere memorizzato nella cache. Esempio: /administrator o /la-mia-pagina-privata"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Componenti Esclusi"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Seleziona i componenti le cui pagine non devono mai essere memorizzate nella cache da SiteGround."

; Toolbar button settings
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Mostra Pulsante Svuota nell'Amministrazione"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Mostra un pulsante 'Purge SG Cache' nella barra superiore dell'area di amministrazione di Joomla, visibile su ogni pagina."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Modalità Pulsante"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Semplice: un pulsante che svuota tutta la cache. Dropdown: un pulsante con 'Svuota Tutto' più opzioni di percorso personalizzate."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Semplice - Svuota Tutto"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Dropdown - Svuota Tutto + Percorsi Personalizzati"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Percorsi di Svuotamento Personalizzati"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="Una voce per riga nel formato: Etichetta|/percorso. Queste appaiono come opzioni nel dropdown. Esempio: Blog|/blog o Sezione Notizie|/notizie"

; Toolbar button labels
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Svuota Tutta la Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="Svuota Percorso Specifico"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Svuotamento in corso..."

; Logging & debug settings
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Abilita Registrazione su File"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Scrive le operazioni della cache in un file di log nella directory dei log di Joomla. Utile per la risoluzione dei problemi. Disattivare in produzione per le migliori prestazioni."
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="Modalità Dettagliata"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="Registra ogni visita alla pagina frontend incluse le risposte con cache abilitata. Quando disattivato, vengono registrati solo bypass della cache, svuotamenti, errori e modifiche al contenuto. Attivare temporaneamente per la risoluzione dei problemi, poi disattivare in produzione."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Abilita Pannello Debug"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Mostra un pannello di debug in fondo a ogni pagina di amministrazione che visualizza le operazioni della cache verificatesi durante la richiesta corrente. Visibile solo agli amministratori."
PLG_SYSTEM_SGCACHE_LOG_FILE="Nome File di Log"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Nome del file di log nella directory dei log di Joomla. Predefinito: sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Dimensione Massima Log (MB)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="Quando il file di log supera questa dimensione, verrà ruotato. Mantiene gli ultimi 5 file ruotati. Predefinito: 5 MB."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Visualizzatore Log"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="Visualizza, scarica, testa o cancella il log della cache."

; Log viewer / dashboard
PLG_SYSTEM_SGCACHE_LOG_VIEW="Visualizza Log"
PLG_SYSTEM_SGCACHE_LOG_VIEW_FULL="Apri Visualizzatore Completo"
PLG_SYSTEM_SGCACHE_LOG_DOWNLOAD="Scarica"
PLG_SYSTEM_SGCACHE_LOG_CLEAR="Cancella"
PLG_SYSTEM_SGCACHE_LOG_TEST="Test"
PLG_SYSTEM_SGCACHE_LOG_REFRESH="Aggiorna"
PLG_SYSTEM_SGCACHE_LOG_CLEAR_CONFIRM="Cancellare tutte le voci del log? Questa operazione non può essere annullata."
PLG_SYSTEM_SGCACHE_LOG_NO_ENTRIES="Nessuna voce nel log. Abilita la registrazione sopra ed esegui alcune azioni (salva un articolo, svuota la cache) per vedere le voci qui."
PLG_SYSTEM_SGCACHE_LOG_LOADING="Caricamento..."
PLG_SYSTEM_SGCACHE_LOG_SHOW_MORE="Mostra di Più"
PLG_SYSTEM_SGCACHE_LOG_SHOW_LESS="Mostra di Meno"

