PLG_SYSTEM_SGCACHE_DEBUG_PANEL_TITLE="SG Cache Debug"

; Advanced settings
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT="Variazione per User Agent"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Aggiunge l'intestazione Vary: User-Agent per servire diverse versioni memorizzate nella cache per browser mobili e desktop."
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="Cache per Utenti Autenticati"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="Consenti la memorizzazione nella cache per gli utenti autenticati. ATTENZIONE: Potrebbe mostrare contenuti errati agli utenti. Attivare solo se il sito mostra lo stesso contenuto a tutti gli utenti."
PLG_SYSTEM_SGCACHE_PURGE_BUTTON="Svuotamento Manuale della Cache"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON_DESC="Clicca per svuotare manualmente tutta la cache di SiteGround."

