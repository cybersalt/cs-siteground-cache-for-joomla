PLG_SYSTEM_SGCACHE_PURGE_ALL_CACHE="Svuota Tutta la Cache"
PLG_SYSTEM_SGCACHE_PURGE_SUCCESS="La cache di SiteGround è stata svuotata con successo."
PLG_SYSTEM_SGCACHE_PURGE_PATH_SUCCESS="Cache di SiteGround svuotata per il percorso: %s"
PLG_SYSTEM_SGCACHE_PURGE_FAILED="Impossibile svuotare la cache di SiteGround. Verifica di essere su un server SiteGround."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND="Hosting SiteGround non rilevato. Le operazioni della cache non sono disponibili."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND_NOTICE="Questo sito non sembra essere ospitato su SiteGround. Il plugin SiteGround Cache è abilitato ma tutte le operazioni della cache sono inattive. Se hai migrato questo sito da SiteGround, puoi disattivare o disinstallare questo plugin in sicurezza."
