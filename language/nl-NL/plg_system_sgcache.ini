PLG_SYSTEM_SGCACHE="Systeem - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Integreert Joomla met het server-side cachesysteem van SiteGround. Wist automatisch de dynamische cache wanneer inhoud wijzigt en stelt de juiste cache-headers in.<br/><br/><small>Cache-communicatieprotocol geleerd van SiteGround's <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> plugin voor WordPress (GPLv3). Er is geen code gekopieerd; dit is een onafhankelijke Joomla-implementatie. Niet gelieerd aan of goedgekeurd door SiteGround.</small>"
