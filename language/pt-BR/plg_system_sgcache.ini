PLG_SYSTEM_SGCACHE_PURGE_ALL_CACHE="Limpar Todo o Cache"
PLG_SYSTEM_SGCACHE_PURGE_SUCCESS="O cache do SiteGround foi limpo com sucesso."
PLG_SYSTEM_SGCACHE_PURGE_PATH_SUCCESS="Cache do SiteGround limpo para o caminho: %s"
PLG_SYSTEM_SGCACHE_PURGE_FAILED="Falha ao limpar o cache do SiteGround. Verifique se você está em um servidor SiteGround."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND="Hospedagem SiteGround não detectada. As operações de cache não estão disponíveis."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND_NOTICE="Este site não parece estar hospedado no SiteGround. O plugin SiteGround Cache está habilitado, mas todas as operações de cache estão inativas. Se você migrou este site do SiteGround, pode desativar ou desinstalar este plugin com segurança."
