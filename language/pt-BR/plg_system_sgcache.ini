PLG_SYSTEM_SGCACHE_LOG_CLEAR_CONFIRM="Limpar todas as entradas do log? Esta ação não pode ser desfeita."
PLG_SYSTEM_SGCACHE_LOG_NO_ENTRIES="Nenhuma entrada no log ainda. Habilite o registro acima e execute algumas ações (salve um artigo, limpe o cache) para ver entradas aqui."
PLG_SYSTEM_SGCACHE_LOG_LOADING="Carregando..."
