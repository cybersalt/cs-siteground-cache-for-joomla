; Advanced settings
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT="Variar por User Agent"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Adiciona o cabeçalho Vary: User-Agent para servir diferentes versões em cache para navegadores móveis e desktop."
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="Cache para Usuários Autenticados"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="Permitir cache para usuários autenticados. ATENÇÃO: Pode mostrar conteúdo incorreto aos usuários. Habilite apenas se seu site exibe o mesmo conteúdo para todos os usuários."
PLG_SYSTEM_SGCACHE_PURGE_BUTTON="Limpeza Manual do Cache"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON_DESC="Clique para limpar manualmente todo o cache do SiteGround."

