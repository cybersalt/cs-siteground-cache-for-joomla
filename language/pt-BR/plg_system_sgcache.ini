PLG_SYSTEM_SGCACHE="System - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Integra o Joomla com o sistema de cache do lado do servidor do SiteGround. Limpa automaticamente o cache dinâmico quando o conteúdo é alterado e define os cabeçalhos de cache apropriados.<br/><br/><small>Protocolo de comunicação de cache aprendido do plugin <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> para WordPress do SiteGround (GPLv3). Nenhum código foi copiado; esta é uma implementação Joomla independente. Não afiliado ou endossado pelo SiteGround.</small>"

; Fieldset labels
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Configurações de Cache"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="Botão da Barra de Ferramentas"
PLG_SYSTEM_SGCACHE_FIELDSET_LOGGING="Registro &amp; Debug"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="Configurações Avançadas"

; Cache settings
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Habilitar Cache Dinâmico"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Habilita os cabeçalhos de cache dinâmico do SiteGround. As páginas serão marcadas como armazenáveis em cache para o proxy reverso do SiteGround."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Limpeza Automática ao Alterar Conteúdo"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Limpa automaticamente as entradas de cache relacionadas quando o conteúdo é salvo, excluído ou o estado é alterado."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Limite de Limpeza"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="Se mais do que este número de URLs precisarem de limpeza, uma limpeza completa do cache será realizada em vez de limpar individualmente. Padrão: 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="URLs Excluídas"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Insira um caminho de URL por linha (relativo à raiz do site) que nunca deve ser armazenado em cache. Exemplo: /administrator ou /minha-pagina-privada"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Componentes Excluídos"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Selecione os componentes cujas páginas nunca devem ser armazenadas em cache pelo SiteGround."

; Toolbar button settings
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Mostrar Botão Limpar no Admin"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Exibe um botão 'Purge SG Cache' na barra superior da área de administração do Joomla, visível em todas as páginas."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Modo do Botão"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Simples: um botão que limpa todo o cache. Dropdown: um botão dividido com 'Limpar Tudo' mais opções de caminhos personalizados."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Simples - Limpar Tudo"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Dropdown - Limpar Tudo + Caminhos Personalizados"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Caminhos de Limpeza Personalizados"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="Uma entrada por linha no formato: Rótulo|/caminho. Estas aparecem como opções no dropdown. Exemplo: Blog|/blog ou Seção de Notícias|/noticias"

; Toolbar button labels
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Limpar Todo o Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="Limpar Caminho Específico"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Limpando..."

; Logging & debug settings
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Habilitar Registro em Arquivo"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Grava as operações de cache em um arquivo de log no diretório de logs do Joomla. Útil para solução de problemas. Desative em produção para melhor desempenho."
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="Modo Detalhado"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="Registra cada visita à página frontend incluindo respostas com cache habilitado. Quando desativado, apenas bypasses de cache, limpezas, erros e alterações de conteúdo são registrados. Ative temporariamente para solução de problemas, depois desative em produção."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Habilitar Painel de Debug"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Mostra um painel de debug na parte inferior de cada página de administração exibindo as operações de cache que ocorreram durante a requisição atual. Visível apenas para administradores."
PLG_SYSTEM_SGCACHE_LOG_FILE="Nome do Arquivo de Log"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Nome do arquivo de log dentro do diretório de logs do Joomla. Padrão: sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Tamanho Máximo do Log (MB)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="Quando o arquivo de log exceder este tamanho, será rotacionado. Mantém os últimos 5 arquivos rotacionados. Padrão: 5 MB."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Visualizador de Log"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="Visualize, baixe, teste ou limpe o log de cache."

