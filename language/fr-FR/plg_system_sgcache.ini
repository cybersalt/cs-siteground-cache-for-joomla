PLG_SYSTEM_SGCACHE="Système - SiteGround Cache"
PLG_SYSTEM_SGCACHE_DESCRIPTION="Intègre Joomla avec le système de cache côté serveur de SiteGround. Purge automatiquement le cache dynamique lorsque le contenu change et définit les en-têtes de cache appropriés.<br/><br/><small>Protocole de communication du cache appris du plugin <a href='https://wordpress.org/plugins/sg-cachepress/'>Speed Optimizer</a> de SiteGround pour WordPress (GPLv3). Aucun code n'a été copié ; ceci est une implémentation Joomla indépendante. Non affilié ni approuvé par SiteGround.</small>"
PLG_SYSTEM_SGCACHE_FIELDSET_CACHE="Paramètres du cache"
PLG_SYSTEM_SGCACHE_FIELDSET_TOOLBAR="Bouton de barre d'outils"
PLG_SYSTEM_SGCACHE_FIELDSET_LOGGING="Journalisation &amp; Debug"
PLG_SYSTEM_SGCACHE_FIELDSET_ADVANCED="Paramètres avancés"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE="Activer le cache dynamique"
PLG_SYSTEM_SGCACHE_ENABLE_DYNAMIC_CACHE_DESC="Active les en-têtes de cache dynamique de SiteGround. Les pages seront marquées comme cacheables pour le proxy inverse de SiteGround."
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH="Purge automatique au changement de contenu"
PLG_SYSTEM_SGCACHE_ENABLE_AUTOFLUSH_DESC="Purger automatiquement les entrées de cache associées lorsque le contenu est enregistré, supprimé ou que son état est modifié."
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD="Seuil de purge"
PLG_SYSTEM_SGCACHE_PURGE_THRESHOLD_DESC="Si plus de ce nombre d'URL's doivent être purgées, un vidage complet du cache sera effectué au lieu d'une purge individuelle. Par défaut : 10."
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS="URL's exclues"
PLG_SYSTEM_SGCACHE_EXCLUDED_URLS_DESC="Entrez un chemin d'URL par ligne (relatif à la racine du site) qui ne doit jamais être mis en cache. Exemple : /administrator ou /ma-page-privee"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS="Composants exclus"
PLG_SYSTEM_SGCACHE_EXCLUDED_COMPONENTS_DESC="Sélectionnez les composants dont les pages ne doivent jamais être mises en cache par SiteGround."
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON="Afficher le bouton de purge dans l'administration"
PLG_SYSTEM_SGCACHE_SHOW_TOOLBAR_BUTTON_DESC="Affiche un bouton 'Purge SG Cache' dans la barre supérieure de l'espace d'administration Joomla, visible sur chaque page."
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE="Mode du bouton"
PLG_SYSTEM_SGCACHE_TOOLBAR_BUTTON_MODE_DESC="Simple : un bouton qui purge tout le cache. Dropdown : un bouton divisé avec 'Tout purger' plus des options de chemins personnalisés."
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_ALL="Simple - Tout purger"
PLG_SYSTEM_SGCACHE_TOOLBAR_MODE_DROPDOWN="Dropdown - Tout purger + Chemins personnalisés"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS="Chemins de purge personnalisés"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_DESC="Une entrée par ligne au format : Libellé|/chemin. Celles-ci apparaissent comme options dans le dropdown. Exemple : Blog|/blog ou Section actualités|/actualites"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE="Purge SG Cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_ALL="Purger tout le cache"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGE_PATHS_LABEL="Purger un chemin spécifique"
PLG_SYSTEM_SGCACHE_TOOLBAR_PURGING="Purge en cours..."
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING="Activer la journalisation fichier"
PLG_SYSTEM_SGCACHE_ENABLE_LOGGING_DESC="Écrit les opérations de cache dans un fichier journal dans le répertoire de journaux de Joomla. Utile pour le dépannage. Désactivez en production pour de meilleures performances."
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING="Mode détaillé"
PLG_SYSTEM_SGCACHE_VERBOSE_LOGGING_DESC="Journalise chaque visite de page frontend y compris les réponses avec cache activé. Lorsque désactivé, seuls les contournements de cache, purges, erreurs et changements de contenu sont journalisés. Activez temporairement pour le dépannage, puis désactivez pour la production."
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG="Activer le panneau de debug"
PLG_SYSTEM_SGCACHE_ENABLE_DEBUG_DESC="Affiche un panneau de debug en bas de chaque page d'administration montrant les opérations de cache effectuées pendant la requête en cours. Visible uniquement par les administrateurs."
PLG_SYSTEM_SGCACHE_LOG_FILE="Nom du fichier journal"
PLG_SYSTEM_SGCACHE_LOG_FILE_DESC="Nom du fichier journal dans le répertoire de journaux de Joomla. Par défaut : sgcache.log"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE="Taille maximale du journal (Mo)"
PLG_SYSTEM_SGCACHE_MAX_LOG_SIZE_DESC="Lorsque le fichier journal dépasse cette taille, il sera soumis à une rotation. Conserve les 5 derniers fichiers de rotation. Par défaut : 5 Mo."
PLG_SYSTEM_SGCACHE_LOG_VIEWER="Visionneuse de journal"
PLG_SYSTEM_SGCACHE_LOG_VIEWER_DESC="Afficher, télécharger, tester ou effacer le journal de cache."
PLG_SYSTEM_SGCACHE_LOG_VIEW="Voir le journal"
PLG_SYSTEM_SGCACHE_LOG_VIEW_FULL="Ouvrir la visionneuse complète"
PLG_SYSTEM_SGCACHE_LOG_DOWNLOAD="Télécharger"
PLG_SYSTEM_SGCACHE_LOG_CLEAR="Effacer"
PLG_SYSTEM_SGCACHE_LOG_TEST="Tester"
PLG_SYSTEM_SGCACHE_LOG_REFRESH="Actualiser"
PLG_SYSTEM_SGCACHE_LOG_CLEAR_CONFIRM="Effacer toutes les entrées du journal ? Cette action est irréversible."
PLG_SYSTEM_SGCACHE_LOG_NO_ENTRIES="Aucune entrée de journal pour le moment. Activez la journalisation ci-dessus et effectuez quelques actions (enregistrer un article, purger le cache) pour voir des entrées ici."
PLG_SYSTEM_SGCACHE_LOG_LOADING="Chargement..."
PLG_SYSTEM_SGCACHE_LOG_SHOW_MORE="Afficher plus"
PLG_SYSTEM_SGCACHE_LOG_SHOW_LESS="Afficher moins"
PLG_SYSTEM_SGCACHE_DEBUG_PANEL_TITLE="SG Cache Debug"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT="Varier selon le User Agent"
PLG_SYSTEM_SGCACHE_VARY_USER_AGENT_DESC="Ajoute l'en-tête Vary: User-Agent pour servir différentes versions en cache pour les navigateurs mobiles et de bureau."
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN="Cache pour les utilisateurs connectés"
PLG_SYSTEM_SGCACHE_CACHE_LOGGED_IN_DESC="Autoriser la mise en cache pour les utilisateurs connectés. ATTENTION : Peut afficher un contenu incorrect aux utilisateurs. N'activez que si votre site affiche le même contenu à tous les utilisateurs."
PLG_SYSTEM_SGCACHE_PURGE_BUTTON="Purge manuelle du cache"
PLG_SYSTEM_SGCACHE_PURGE_BUTTON_DESC="Cliquez pour purger manuellement tout le cache SiteGround."
PLG_SYSTEM_SGCACHE_PURGE_ALL_CACHE="Purger tout le cache"
PLG_SYSTEM_SGCACHE_PURGE_SUCCESS="Le cache SiteGround a été purgé avec succès."
PLG_SYSTEM_SGCACHE_PURGE_PATH_SUCCESS="Cache SiteGround purgé pour le chemin : %s"
PLG_SYSTEM_SGCACHE_PURGE_FAILED="Échec de la purge du cache SiteGround. Vérifiez que vous êtes sur un serveur SiteGround."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND="Hébergement SiteGround non détecté. Les opérations de cache ne sont pas disponibles."
PLG_SYSTEM_SGCACHE_NOT_SITEGROUND_NOTICE="Ce site ne semble pas être hébergé chez SiteGround. Le plugin SiteGround Cache est activé mais toutes les opérations de cache sont inactives. Si vous avez migré ce site depuis SiteGround, vous pouvez désactiver ou désinstaller ce plugin en toute sécurité."
